<html>
    <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      body {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      #camera-preview-panel {
        position: fixed;
        top: 0;
        right: 0;
        width: 50vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #050505;
        border-left: 1px solid rgba(255, 255, 255, 0.16);
        z-index: 20;
        pointer-events: none;
      }

      #camera-preview {
        width: min(50vw, 150vh);
        height: min(33.333vw, 100vh);
        aspect-ratio: 3 / 2;
        object-fit: cover;
        transform: scaleX(-1);
        background: #111;
      }
    </style>
    <script src="mySketch.js" type="text/javascript"></script><script src="tab2.js" type="text/javascript"></script><script src="https://cdn.jsdelivr.net/npm/p5@1.10.0/lib/p5.js" type="text/javascript"></script><script src="https://cdn.jsdelivr.net/gh/IDMNYU/p5.js-func@0.5.1/lib/p5.func.min.js" type="text/javascript"></script><script src="https://cdn.jsdelivr.net/npm/p5@1.10.0/lib/addons/p5.sound.min.js" type="text/javascript"></script>
    <script src="https://unpkg.com/ml5@0.20.0-alpha.3/dist/ml5.js" type="text/javascript"></script>
    </head>
<body>
  <aside id="camera-preview-panel" aria-hidden="true">
    <video id="camera-preview" autoplay muted playsinline></video>
  </aside>
</body>

</html>
